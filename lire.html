<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programme de la filière — IHBI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Barre de navigation ── */
    header {
      background: #c0392b;
      color: #fff;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      opacity: .85;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s;
    }
    header a:hover { opacity: 1; }
    header .sep { opacity: .35; font-size: 16px; }
    header .title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Contenu principal ── */
    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 36px 24px 64px;
    }

    /* Injecté depuis le fichier HTML généré */
    #doc-content h2 {
      font-size: 19px; font-weight: 800;
      margin: 28px 0 10px; color: #1a2c6b;
      border-bottom: 2px solid #C8973A;
      padding-bottom: 6px;
    }
    #doc-content h3 {
      font-size: 16px; font-weight: 700;
      margin: 22px 0 8px; color: #1a2c6b;
    }
    #doc-content h4 {
      font-size: 14.5px; font-weight: 700;
      margin: 16px 0 6px; color: #1a2c6b;
    }
    #doc-content p {
      font-size: 15px; line-height: 1.75;
      color: #2d3748; margin: 8px 0;
    }
    #doc-content ul {
      margin: 10px 0 10px 20px; color: #2d3748;
    }
    #doc-content li {
      font-size: 15px; line-height: 1.7;
      margin: 5px 0; padding-left: 4px;
    }
    #doc-content strong { font-weight: 700; color: #1a2c6b; }
    #doc-content em { color: #555; font-style: italic; }
    #doc-content table {
      width: 100%; border-collapse: collapse;
      margin: 16px 0; font-size: 14px;
      overflow-x: auto; display: block;
    }
    #doc-content th {
      background: #1a2c6b; color: #fff;
      padding: 9px 12px; text-align: left; font-weight: 600;
    }
    #doc-content td {
      padding: 8px 12px;
      border-bottom: 1px solid #e2e8f0; vertical-align: top;
    }
    #doc-content tr:nth-child(even) td { background: #f8f9fc; }

    /* ── États ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      padding: 80px 0; color: #8a9bb5;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #c0392b;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .error-box h2 { font-size: 18px; color: #c0392b; margin-bottom: 10px; }
    .error-box p  { font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .error-box a  {
      background: #c0392b; color: #fff;
      padding: 10px 24px; border-radius: 6px;
      text-decoration: none; font-size: 14px; font-weight: 600;
    }

    @media (max-width: 600px) {
      main { padding: 24px 16px 48px; }
      #doc-content h2 { font-size: 17px; }
      #doc-content p, #doc-content li { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← Retour</a>
    <span class="sep">|</span>
    <span class="title" id="hdr-title">Programme de la filière</span>
  </header>

  <main>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Chargement du document…</span>
    </div>
    <div id="doc-content"></div>
    <div class="error-box" id="err-box">
      <h2>Document non disponible</h2>
      <p>Impossible de charger ce document pour le moment.<br>Vous pouvez le télécharger directement.</p>
      <a id="dl-link" href="#">Télécharger le document (.docx)</a>
    </div>
  </main>

  <script>
    const TITRES = {
      '2MA':  'Moteur et Mécanique Automobile (2MA)',
      'ATA':  'Agriculture Tropicale — Production Animale (ATPA)',
      'ATV':  'Agriculture Tropicale — Production Végétale (ATPV)',
      'GEC':  'Gestion Commerciale (GEC)',
      'ELT':  'Électrotechnique (ELT)',
      'RHC':  'Ressources Humaines et Communication (RHC)',
      'RIT':  'Réseaux Informatiques et Télécommunications (RIT)',
      'TH':   'Tourisme et Hôtellerie (TH)',
      'FCGE': 'Finances Comptabilité Gestion des Entreprises (FCGE)',
      'IDA':  "Informatique Développeur d'Applications (IDA)",
      'MSP':  'Maintenance des Systèmes de Production (MSP)',
    };

    const params = new URLSearchParams(window.location.search);
    const code   = (params.get('doc') || '').toUpperCase();

    if (!code || !TITRES[code]) {
      window.location.replace('index.html');
    } else {
      const titre   = TITRES[code];
      document.title = titre + ' — IHBI';
      document.getElementById('hdr-title').textContent = titre;
      document.getElementById('dl-link').href = 'docs/' + code + '.docx';

      fetch('docs/html/' + code + '.html')
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(html => {
          // DOMParser isole correctement head/body, évite l'injection du <style>
          const parsed = new DOMParser().parseFromString(html, 'text/html');
          document.getElementById('loading').style.display  = 'none';
          document.getElementById('doc-content').innerHTML  = parsed.body.innerHTML;
        })
        .catch(() => {
          document.getElementById('loading').style.display  = 'none';
          document.getElementById('err-box').style.display  = 'block';
        });
    }
  </script>
</body>
</html>
